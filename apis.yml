aid: google-cloud-workflows
name: Google Cloud Workflows
description: >-
  Google Cloud Workflows is a serverless orchestration service that lets you combine Google Cloud services and APIs into
  flexible, automated workflows. Workflows manages the order of execution, including handling retries, waiting, and
  polling, and ensures reliable execution despite hardware and networking interruptions. It supports conditional logic,
  subworkflows, and connectors to integrate with other Google Cloud products.
